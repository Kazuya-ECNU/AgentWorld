<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent World - 世界观察</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 左侧地图 */
        .map-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .world-time {
            font-size: 14px;
            color: #888;
        }

        .world-time span {
            color: #e94560;
            font-weight: 600;
        }

        /* 地图区域 */
        .map-container {
            flex: 1;
            background: #16213e;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid #0f3460;
        }

        .zone {
            position: absolute;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            padding: 5px;
        }

        .zone:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .zone-name {
            font-size: 11px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .zone-count {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
        }

        .zone-legend {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 区域颜色 */
        .zone-village_square { background: linear-gradient(135deg, #e94560, #c73e54); }
        .zone-market { background: linear-gradient(135deg, #f39c12, #d68910); }
        .zone-tavern { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .zone-farm { background: linear-gradient(135deg, #27ae60, #1e8449); }
        .zone-mine { background: linear-gradient(135deg, #5d6d7e, #4a5568); }
        .zone-forest { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .zone-library { background: linear-gradient(135deg, #3498db, #2980b9); }
        .zone-temple { background: linear-gradient(135deg, #f1c40f, #d4ac0d); }
        .zone-barracks { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .zone-outskirts { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }

        /* Agent 标记 */
        .agent-marker {
            position: absolute;
            font-size: 20px;
            transform: translate(-50%, -50%);
            z-index: 20;
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 右侧面板 */
        .side-panel {
            width: 320px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #0f3460;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            transition: all 0.3s;
        }

        .tab.active {
            color: #e94560;
            border-bottom: 2px solid #e94560;
        }

        .tab:hover {
            color: #fff;
        }

        /* NPC 列表 */
        .npc-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .npc-card {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #0f3460;
            cursor: pointer;
            transition: all 0.3s;
        }

        .npc-card:hover {
            border-color: #e94560;
            transform: translateX(3px);
        }

        .npc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .npc-name {
            font-weight: 600;
            color: #fff;
        }

        .npc-level {
            font-size: 11px;
            background: #e94560;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .npc-role {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .npc-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .status-idle { background: #27ae60; color: #fff; }
        .status-working { background: #3498db; color: #fff; }
        .status-traveling { background: #f39c12; color: #fff; }
        .status-socializing { background: #9b59b6; color: #fff; }
        .status-resting { background: #95a5a6; color: #fff; }

        .npc-location {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .npc-vitality {
            font-size: 11px;
            color: #27ae60;
            margin-top: 2px;
        }

        /* 世界信息 */
        .world-info {
            padding: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 13px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #fff;
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* 连接线 SVG */
        .map-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .connection-line {
            stroke: rgba(255,255,255,0.15);
            stroke-width: 2;
            fill: none;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 3px;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #c73e54;
        }

        /* 角色标签颜色 */
        .role-merchant { color: #f39c12; }
        .role-guard { color: #e74c3c; }
        .role-farmer { color: #27ae60; }
        .role-scholar { color: #3498db; }
        .role-artisan { color: #9b59b6; }
        .role-miner { color: #5d6d7e; }
        .role-healer { color: #f1c40f; }
        .role-barbarian { color: #c0392b; }
        .role-sage { color: #8e44ad; }
        .role-wanderer { color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：地图 -->
        <div class="map-panel">
            <div class="panel-header">
                <div class="panel-title">🗺️ 世界地图</div>
                <div class="world-time">
                    <span id="season_emoji">🌱</span> <span id="season_text">春</span>
                    &nbsp;第 <span id="year">1</span> 年 <span id="month">1</span> 月 <span id="day">1</span> 日
                    &nbsp;&nbsp;
                    <span id="hour">08</span>:<span id="minute">00</span>
                    &nbsp;<span id="time_of_day" style="color:#aaa;">白天</span>
                </div>
            </div>
            <div class="map-container" id="mapContainer">
                <!-- 区域将在这里动态生成 -->
            </div>
        </div>

        <!-- 右侧：信息面板 -->
        <div class="side-panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('npcs')">NPC</div>
                <div class="tab" onclick="switchTab('agents')">Agent</div>
                <div class="tab" onclick="switchTab('objects')">物体</div>
                <div class="tab" onclick="switchTab('world')">信息</div>
            </div>

            <!-- NPC 列表 -->
            <div class="npc-list" id="npcListPanel">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">🌍</div>
                    <div>暂无 NPC</div>
                    <div style="font-size: 12px; margin-top: 5px;">等待世界初始化...</div>
                </div>
                <div id="npcList"></div>
            </div>

            <!-- 外部 Agent 列表 -->
            <div class="npc-list" id="agentsListPanel" style="display: none;">
                <div class="empty-state" id="emptyAgentsState">
                    <div class="empty-state-icon">🤖</div>
                    <div>暂无外部 Agent</div>
                    <div style="font-size: 12px; margin-top: 5px;">Agent 通过 API 注册...</div>
                </div>
                <div id="agentsList"></div>
            </div>

            <!-- 物体列表 -->
            <div class="npc-list" id="objectsListPanel" style="display: none;">
                <div class="empty-state" id="emptyObjectsState">
                    <div class="empty-state-icon">📦</div>
                    <div>暂无物体数据</div>
                </div>
                <div id="objectsList"></div>
            </div>

            <!-- 世界信息 -->
            <div class="world-info" id="worldInfoPanel" style="display: none;">
                <div class="info-row">
                    <span class="info-label">世界名称</span>
                    <span class="info-value" id="worldName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">世界描述</span>
                    <span class="info-value" id="worldDesc">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">区域数量</span>
                    <span class="info-value" id="zoneCount">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">活跃 NPC</span>
                    <span class="info-value" id="activeNpcs">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">总事件数</span>
                    <span class="info-value" id="totalEvents">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://192.168.10.226:8765';
        let currentTab = 'npcs';
        let worldData = null;
        let npcsData = [];
        let agentsData = [];
        let objectsData = [];

        // 角色名称映射
        const roleNames = {
            merchant: '商人',
            guard: '守卫',
            farmer: '农民',
            scholar: '学者',
            artisan: '工匠',
            miner: '矿工',
            healer: '治疗师',
            barbarian: '野蛮人',
            sage: '贤者',
            wanderer: '流浪者'
        };

        // 状态名称映射
        const statusNames = {
            idle: '空闲',
            working: '工作中',
            traveling: '移动中',
            socializing: '社交中',
            resting: '休息中'
        };

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('npcListPanel').style.display = tab === 'npcs' ? 'flex' : 'none';
            document.getElementById('agentsListPanel').style.display = tab === 'agents' ? 'flex' : 'none';
            document.getElementById('objectsListPanel').style.display = tab === 'objects' ? 'flex' : 'none';
            document.getElementById('worldInfoPanel').style.display = tab === 'world' ? 'block' : 'none';
        }

        // 加载世界数据
        async function loadWorld() {
            try {
                const res = await fetch(`${API_BASE}/api/world`);
                const data = await res.json();
                // FastAPI 返回直接是 WorldResponse 对象（不在 success 包装里）
                if (data.id && data.zones) {
                    worldData = data;
                    renderWorldTime();
                    renderZones();
                    renderWorldInfo();
                }
            } catch (e) {
                console.error('加载世界数据失败:', e);
            }
        }

        // 加载 NPC 数据
        async function loadNPCs() {
            try {
                const res = await fetch(`${API_BASE}/api/npc`);
                const data = await res.json();
                if (data.success) {
                    npcsData = data.data;
                    renderNPCs();
                }
            } catch (e) {
                console.error('加载 NPC 数据失败:', e);
            }
        }

        // 加载外部 Agent 数据
        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/api/agent/agents`);
                const data = await res.json();
                if (data.success) {
                    agentsData = data.data;
                    renderAgents();
                    renderZones();  // 重新渲染地图上的 agent 标记
                }
            } catch (e) {
                console.error('加载 Agent 数据失败:', e);
            }
        }

        // 加载物体数据
        async function loadObjects() {
            try {
                // 物体数据需要通过 agent API 获取（因为 world API 没有返回）
                const res = await fetch(`${API_BASE}/api/agent/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: '__viewer__', role: 'explorer' })
                });
                const data = await res.json();
                if (data.api_key) {
                    const worldRes = await fetch(`${API_BASE}/api/agent/world`, {
                        headers: { 'X-Api-Key': data.api_key }
                    });
                    const worldData = await worldRes.json();
                    if (worldData.objects) {
                        objectsData = worldData.objects;
                        renderObjects();
                        renderZones();  // 重新渲染地图上的物体状态
                    }
                }
            } catch (e) {
                console.error('加载物体数据失败:', e);
            }
        }

        // 渲染 Agent 列表
        function renderAgents() {
            const container = document.getElementById('agentsList');
            const emptyState = document.getElementById('emptyAgentsState');
            
            if (!agentsData || agentsData.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.style.display = 'none';
            container.innerHTML = agentsData.map(agent => `
                <div class="npc-card">
                    <div class="npc-header">
                        <span class="npc-name">🤖 ${agent.name}</span>
                        <span class="npc-level">${agent.role}</span>
                    </div>
                    <div>
                        <span class="npc-status status-working">在线</span>
                    </div>
                    <div class="npc-location">📍 ${agent.position?.zone_id || '未知'}</div>
                    ${agent.inventory && agent.inventory.length > 0 ? `<div class="npc-location">🎒 ${agent.inventory.join(', ')}</div>` : ''}
                </div>
            `).join('');
        }

        // 渲染物体列表
        function renderObjects() {
            const container = document.getElementById('objectsList');
            const emptyState = document.getElementById('emptyObjectsState');
            
            if (!objectsData || objectsData.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.style.display = 'none';
            container.innerHTML = objectsData.map(obj => `
                <div class="npc-card">
                    <div class="npc-header">
                        <span class="npc-name">${obj.name}</span>
                        <span class="npc-level">${obj.object_type}</span>
                    </div>
                    <div>
                        <span class="npc-status status-${obj.state === 'available' ? 'idle' : 'working'}">${obj.state === 'available' ? '空闲' : '占用中'}</span>
                    </div>
                    <div class="npc-location">📍 ${obj.zone_id}</div>
                    ${obj.current_user ? `<div class="npc-location">👤 占用者: ${obj.current_user.slice(0,8)}...</div>` : ''}
                </div>
            `).join('');
        }

        // 渲染世界时间
        function renderWorldTime() {
            if (!worldData) return;
            const wt = worldData.world_time;
            document.getElementById('year').textContent = wt.year;
            document.getElementById('month').textContent = wt.month;
            document.getElementById('day').textContent = wt.day;
            document.getElementById('hour').textContent = String(wt.hour).padStart(2, '0');
            document.getElementById('minute').textContent = String(wt.minute).padStart(2, '0');
            
            // 季节和时段显示
            const month = wt.month;
            const hour = wt.hour;
            const seasons = {1:['🌱','春'],2:['🌱','春'],3:['🌱','春'],4:['☀️','夏'],5:['☀️','夏'],6:['☀️','夏'],7:['🍂','秋'],8:['🍂','秋'],9:['🍂','秋'],10:['❄️','冬'],11:['❄️','冬'],12:['❄️','冬']};
            const [emoji, sname] = seasons[month] || ['🌱','春'];
            document.getElementById('season_emoji').textContent = emoji;
            document.getElementById('season_text').textContent = sname;
            
            const tod = (5<=hour&&hour<8)?'黎明':(8<=hour&&hour<17)?'白天':(17<=hour&&hour<20)?'黄昏':'夜间';
            document.getElementById('time_of_day').textContent = tod;
            
            // 地图夜间效果
            const isNight = hour >= 20 || hour < 5;
            document.getElementById('mapContainer').style.opacity = isNight ? '0.75' : '1';
        }

        // 渲染世界信息
        function renderWorldInfo() {
            if (!worldData) return;
            document.getElementById('worldName').textContent = worldData.name;
            document.getElementById('worldDesc').textContent = worldData.description;
            document.getElementById('zoneCount').textContent = worldData.zones.length;
            document.getElementById('activeNpcs').textContent = worldData.active_npcs;
            document.getElementById('totalEvents').textContent = worldData.total_events;
        }

        // 渲染区域（地图）
        function renderZones() {
            if (!worldData || !worldData.zones) return;
            
            const container = document.getElementById('mapContainer');
            const zones = worldData.zones;
            
            // 清空现有区域
            container.innerHTML = '';
            
            // 计算位置（基于 bounds）
            zones.forEach(zone => {
                const bounds = zone.bounds;
                const left = bounds.min_x;
                const top = bounds.min_y;
                const width = bounds.max_x - bounds.min_x;
                const height = bounds.max_y - bounds.min_y;
                
                // 计算该区域的 NPC 数量
                const npcCount = npcsData.filter(n => n.position && n.position.zone_id === zone.id).length;
                
                const zoneEl = document.createElement('div');
                zoneEl.className = `zone zone-${zone.zone_type}`;
                zoneEl.style.left = `${left}%`;
                zoneEl.style.top = `${top}%`;
                zoneEl.style.width = `${width}%`;
                zoneEl.style.height = `${height}%`;
                
                // 计算该区域的 agents
                const agentCount = agentsData.filter(a => a.position && a.position.zone_id === zone.id).length;
                
                zoneEl.innerHTML = `
                    <div class="zone-name">${zone.name}</div>
                    <div class="zone-count">${npcCount} NPC${npcCount !== 1 ? 's' : ''}${agentCount > 0 ? ` | 🤖 ${agentCount}` : ''}</div>
                `;
                zoneEl.title = zone.description;
                container.appendChild(zoneEl);
            });
            
            // 渲染 Agent 标记
            if (agentsData && agentsData.length > 0) {
                agentsData.forEach(agent => {
                    if (!agent.position) return;
                    const zone = zones.find(z => z.id === agent.position.zone_id);
                    if (!zone) return;
                    
                    const agentEl = document.createElement('div');
                    agentEl.className = 'agent-marker';
                    agentEl.style.left = `${agent.position.x}%`;
                    agentEl.style.top = `${agent.position.y}%`;
                    agentEl.innerHTML = '🤖';
                    agentEl.title = `Agent: ${agent.name}`;
                    container.appendChild(agentEl);
                });
            }
        }

        // 渲染 NPC 列表
        function renderNPCs() {
            const container = document.getElementById('npcList');
            const emptyState = document.getElementById('emptyState');
            
            if (!npcsData || npcsData.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.style.display = 'none';
            container.innerHTML = npcsData.map(npc => `
                <div class="npc-card">
                    <div class="npc-header">
                        <span class="npc-name">${npc.name}</span>
                        <span class="npc-level">Lv.${npc.level}</span>
                    </div>
                    <div class="npc-role role-${npc.role}">${roleNames[npc.role] || npc.role}</div>
                    <div>
                        <span class="npc-status status-${npc.status}">${statusNames[npc.status] || npc.status}</span>
                    </div>
                    <div class="npc-location">📍 ${npc.position?.zone_id || '未知'}</div>
                    ${npc.vitality !== undefined ? `<div class="npc-vitality">⚡ ${Math.round(npc.vitality)}</div>` : ''}
                </div>
            `).join('');
        }

        // 初始化
        async function init() {
            await loadWorld();
            await loadNPCs();
            await loadAgents();
            await loadObjects();
            
            // 每 5 秒刷新一次数据
            setInterval(async () => {
                await loadWorld();
                await loadNPCs();
                await loadAgents();
            }, 5000);
        }

        init();
    </script>
</body>
</html>
